repositories:
  - name: traefik
    url: https://traefik.github.io/charts
  - name: bitnami
    url: https://charts.bitnami.com/bitnami
  - name: jetstack
    url: https://charts.jetstack.io

helmDefaults:
  wait: true
  timeout: 600
  atomic: true
  createNamespace: true

releases:
  - name: traefik
    namespace: traefik
    chart: traefik/traefik
    version: "39.0.7"
    values:
      - values/traefik.yaml.gotmpl

  - name: postgres-projects
    namespace: apps-deployer
    chart: bitnami/postgresql
    version: "18.5.16"
    values:
      - values/postgresql-projects.yaml.gotmpl
    set:
      - name: auth.database
        value: projects_db

  - name: postgres-deployments
    namespace: apps-deployer
    chart: bitnami/postgresql
    version: "18.5.16"
    values:
      - values/postgresql-deployments.yaml.gotmpl
    set:
      - name: auth.database
        value: deployments_db

  - name: postgres-auth
    namespace: apps-deployer
    chart: bitnami/postgresql
    version: "18.5.16"
    values:
      - values/postgresql-auth.yaml.gotmpl
    set:
      - name: auth.database
        value: auth_db

  - name: celery-broker
    namespace: apps-deployer
    chart: bitnami/redis
    version: "25.3.10"
    values:
      - values/redis.yaml.gotmpl

  - name: workers
    namespace: apps-deployer
    chart: ./charts/workers
    values:
      - values/workers.yaml.gotmpl

  - name: cert-manager
    namespace: cert-manager
    chart: jetstack/cert-manager
    version: "v1.17.2"
    set:
      - name: crds.enabled
        value: "true"

  - name: cert-manager-webhook-yandex
    namespace: cert-manager
    chart: ./charts/cert-manager-webhook-yandex
    needs:
      - cert-manager/cert-manager
    values:
      - values/cert-manager-webhook-yandex.yaml.gotmpl

  - name: cluster-issuer
    namespace: cert-manager
    chart: ./charts/cluster-issuer
    needs:
      - cert-manager/cert-manager-webhook-yandex
    values:
      - values/cluster-issuer.yaml.gotmpl
