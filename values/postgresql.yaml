auth:
  username: appuser
  existingSecret: postgres-passwords  # секрет создаётся скриптом secrets/create-secrets.sh
  secretKeys:
    adminPasswordKey: postgres-password
    userPasswordKey: password

primary:
  persistence:
    enabled: true
    size: 1Gi
    storageClass: yc-network-hdd

resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 512Mi
    cpu: 500m
