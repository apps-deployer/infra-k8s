name: Apply Kubernetes Secrets

on:
  workflow_dispatch:

jobs:
  apply-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yc CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash
          echo "$HOME/yandex-cloud/bin" >> $GITHUB_PATH

      - name: Configure yc and get kubeconfig
        env:
          YC_SA_KEY: ${{ secrets.YC_SA_KEY }}
          YC_FOLDER_ID: ${{ secrets.YC_FOLDER_ID }}
        run: |
          echo "$YC_SA_KEY" > sa-key.json
          yc config set service-account-key sa-key.json
          yc config set folder-id "$YC_FOLDER_ID"
          yc managed-kubernetes cluster get-credentials \
            --name "${{ vars.YC_CLUSTER_NAME }}" \
            --external \
            --force

      - name: Apply secrets
        env:
          PG_AUTH_PASSWORD: ${{ secrets.PG_AUTH_PASSWORD }}
          PG_AUTH_ADMIN_PASSWORD: ${{ secrets.PG_AUTH_ADMIN_PASSWORD }}
          PG_DEPLOYMENTS_PASSWORD: ${{ secrets.PG_DEPLOYMENTS_PASSWORD }}
          PG_DEPLOYMENTS_ADMIN_PASSWORD: ${{ secrets.PG_DEPLOYMENTS_ADMIN_PASSWORD }}
          PG_PROJECTS_PASSWORD: ${{ secrets.PG_PROJECTS_PASSWORD }}
          PG_PROJECTS_ADMIN_PASSWORD: ${{ secrets.PG_PROJECTS_ADMIN_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
        run: bash scripts/secrets.sh
